services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cloud-backend
    environment:
      - PORT=5000
      - JWT_SECRET=${JWT_SECRET:-change-this-in-production-super-secret-key}
      - NODE_ENV=development
    volumes:
      - ./backend/src:/app/src
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: cloud-frontend
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    ports:
      - "80:3000"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    depends_on:
      - backend
    networks:
      - app-network
    restart: unless-stopped

networks:
  app-network:
    driver: bridge
