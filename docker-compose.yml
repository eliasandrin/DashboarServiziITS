services:

  # ─── Backend FastAPI ───────────────────────────────────────
  backend:
    build: ./backend
    container_name: pwmo-backend
    restart: unless-stopped
    environment:
      # Proxmox (sostituisci con i tuoi valori o usa AWS Secrets Manager)
      PROXMOX_HOST: "${PROXMOX_HOST}"
      PROXMOX_USER: "${PROXMOX_USER:-root@pam}"
      PROXMOX_TOKEN_NAME: "${PROXMOX_TOKEN_NAME}"
      PROXMOX_TOKEN_VALUE: "${PROXMOX_TOKEN_VALUE}"
      PROXMOX_VERIFY_SSL: "${PROXMOX_VERIFY_SSL:-false}"
      PBS_STORAGE: "${PBS_STORAGE:-pbs}"

      # Database
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_USER: "${POSTGRES_USER:-pwmo}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-pwmo}"
      POSTGRES_DB: "${POSTGRES_DB:-pwmo}"

      # JWT
      JWT_SECRET: "${JWT_SECRET:-change-this-in-production}"

      # AWS (opzionale — solo per prod con Secrets Manager)
      AWS_SECRET_NAME: "${AWS_SECRET_NAME:-}"
      AWS_REGION: "${AWS_REGION:-eu-west-1}"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - pwmo-net

  # ─── Frontend React + Nginx ────────────────────────────────
  frontend:
    build: ./frontend
    container_name: pwmo-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - pwmo-net

  # ─── Database PostgreSQL (solo sviluppo locale) ────────────
  db:
    image: postgres:16-alpine
    container_name: pwmo-db
    restart: unless-stopped
    profiles: ["dev"]
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-pwmo}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-pwmo}"
      POSTGRES_DB: "${POSTGRES_DB:-pwmo}"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pwmo"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - pwmo-net

volumes:
  pgdata:

networks:
  pwmo-net:
    driver: bridge
